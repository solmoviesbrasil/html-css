<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Utilizando fonte externa baixada</title>
    <style>
        @font-face {
            font-family: 'love-larry';
            src: url('font/love-larry.ttf') format('truetype'), url('font/love-larry.ttf') format('truetype'); /*tipo exato da fonte*/
            font-weight: normal;
            /*Tipos de format:
            - opentype (otf)
            - truetype (ttf)
            - embedded-opentype
            - truetype-aat (Apple Advanced Typography)*/
        }
        @import url('https://fonts.googleapis.com/css2?family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap');

        body{
            font-family: 'Work Sans' , Arial, Helvetica, sans-serif;
        }
        h1{
            font-family: 'love-larry','Times New Roman', Times, serif;
            font-weight: normal;
        }
        p{
            font-size: 30px;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <h1>Olá, mundo!</h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Iusto unde sed doloremque consequatur nam voluptates aliquam omnis officia ab, odit non quod? Temporibus quidem, beatae aspernatur unde repellat eius ratione?</p>

</body>
</html>
