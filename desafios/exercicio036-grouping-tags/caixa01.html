<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de caixa na prática</title>
    <style>
        body{

        }
        /* box-level */
        h1{
            background-color: gray;
            height: 300px;
            width: 300px; 
            
            /* propriedades novas */

            /* border-width: 10px;
            border-color: black;
            border-style: groove; */

            border: 10px groove black;
            
            /* margin interna */

            /* padding-top: 10px;
            padding-right: 10px;
            padding-bottom: 10px;
            padding-left: 10px; */

            /* cima e baixo 10px - esquerdo e direito 20px*/
            padding: 10px 20px;

            /* margin externa */

            /* margin-top: 20px;
            margin-right: 10px;
            margin-bottom: 40px;
            margin-left: 10px; */

            margin: 20px 10px 40px 10px;

            /* outline */

            /* outline-width: 5px;
            outline-style: dashed;
            outline-color: red; */

            outline: 4px dashed red;
            
        }
        /* inline-level */
        a{
            
            font-size: 20px;
            font-weight: bold;
            color: #b30505;
            border-width: 10px;
            border-style: groove;
            border-color: red;
            text-decoration: none;

            /* PADDING */
            padding-top: 10px;
            padding-right: 10px;
            padding-bottom: 10px;
            padding-left: 10px;
        }
    </style>
</head>
<body>
    <h1>Exemplo de caixas box-levels</h1>
    <p>Parágrafos também são exemplos de box-levels, mas os <a href="#">links são exemplos de caixas inline-level</a> Vamos ver como tudo isso funciona</p>
</body>
</html>
