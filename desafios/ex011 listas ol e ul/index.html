<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Lista OL e UL</title>

    <style>
        body {
            background-color:darkgray;
            margin: 30px;
        }        
        p,h1{
            font-family: "JatBrains", monospace;
            font-size: 20px;
        }
    </style>

</head>

<body>
    
    <h1>Trabanhando com listas</h1>

    <h2>Lista ordenadas - para construir um site</h2>
    <!--1 A a I i-->
    <ol type="1" start="1">
        <li>HTML</li>
        <li>CSS</li>
        <li>JavaScript</li>
        <li>node.js</li>
        <li>typescript</li>
        <li>SQL</li>
        <li>Banco de dados</li>
    </ol>

    <h2>Lista NÃO ordenada - para não aprender a construir um site.</h2>
    <!--disc, circle e aquare-->
    <ul type="square">
        <li>feijão</li>
        <li>olho</li>
        <li>arroz</li>
        <li>batata</li>
        <li>alho</li>
    </ul>


</body>
</html>
