<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo-classes</title>
    <style>
        div{
            background-color: lightgray;
            text-align: center;
            
            height: 200px;
            width: 200px;

            /* propriedades novas */
            border: 1px solid black;
            display: inline-block;
        }
        div:hover{
            background-color: blueviolet;
        }
        div > img{
            display: none;
        }
        div:hover > img{
            display: block;
        }    
    </style>

</head>
<body>
    <div id="d1">
        01 - isso é um texto colorido
        <img src="../ex004/logo-css-200.webp" alt="logo css3">
    </div>
    <div id="d2">02</div>
    <div id="d3">03</div>

 
</body>
</html>
