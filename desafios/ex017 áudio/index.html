<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>colocando áudio</title>
    <style>
        body{
            background-color: black;
            margin: 30px;
            color: whitesmoke;    
      
        }

    </style>
</head>

<body>

    <!--Data 19/06/2026 às 23:11 da noite-->
    <!--Revisão - 20/06/2026 às 09:52 da manhã-->
    <h1>Imagem dinâmica</h1>

    <p>Aumente e diminua o tamanho dessa página para ver o efeito de imagens dinâmicas</p>

    <picture>
        <source media="(max-width: 750px)" srcset="imagens/foto-pequena.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="imagens/foto-media.png" type="image/png">
        <img src="imagens/foto-grande.png" alt="foto grande">
    </picture>

    <h1>Reproduzindo áudio</h1>

    <p>Vamos aprender a <strong>reproduzir áudio</strong> em html5</p>

    <audio src="midia/go-to-sleep.mp3" controls muted></audio>

    <!-- a Tag <audio> é compatível com wav, ogg ou mp3-->

    <p>Outra maneira de reproduzir audio no nosso site usando sources</p>

    <audio controls preload="none">
        <source src="midia/go-to-sleep.mp3" type="audio/mpeg">
        <source src="midia/go-to-sleep.wav" type="audio/wav">
        <source src="midia/go-to-sleep.ogg" type="audio/ogg">
        <p>Oops! seu navegador não possui suporte para o formato desse áudio - 
            sem problema pode baixar se quiser: <a href="midia/go-to-sleep.mp3">Baixar música</a>
        </p>
    </audio>
     

</body>
</html>
