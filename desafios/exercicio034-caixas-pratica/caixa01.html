<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de caixa na prática</title>
    <style>
        body{

        }
        h1{
            background-color: gray;
            height: 300px;
            width: 300px;
            border-radius: 20px;
            border-width: 4px;
            border-color: black;

            /* propriedades novas */
            border-style: dotted;
            
            padding-top: 10px;
            padding-right: 10px;
            padding-bottom: 10px;
            padding-left: 10px;

            margin: auto;
            margin-bottom: 50px;
            
            
        }
        a{
            font-size: 20px;
            font-weight: bold;
            color: rgb(179, 5, 5);
            border-width: 10px;
            border-style: dashed;
            border-color: red;


            /* PADDING */
            padding-top: 10px;
            padding-right: 10px;
            padding-bottom: 10px;
            padding-left: 10px;


        }
        a:hover{
            color: pink;
            border: 10px dashed black;
        }
    </style>
</head>
<body>
    <h1>Exemplo de caixas box-levels</h1>
    <p>Parágrafos também são exemplos de box-levels, mas os <a href="#">links são exemplos de caixas inline-level</a> Vamos ver como tudo isso funciona</p>
</body>
</html>
